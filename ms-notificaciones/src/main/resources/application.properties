spring.datasource.url=${DB_URL:jdbc:h2:mem:msnotificacionesdb;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Server
server.port=8085
server.servlet.context-path=/

# Application
spring.application.name=ms-notificaciones
spring.profiles.active=dev

# Eureka
spring.cloud.discovery.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Logging
logging.level.root=WARN
logging.level.org.springframework=INFO
logging.level.com.saludrednorte=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JPA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Feign defaults (future integrations)
spring.cloud.openfeign.client.config.default.connectTimeout=${FEIGN_CONNECT_TIMEOUT:2000}
spring.cloud.openfeign.client.config.default.readTimeout=${FEIGN_READ_TIMEOUT:5000}

# Scheduler
spring.task.scheduling.thread-name-prefix=notif-scheduler-
spring.task.scheduling.pool.size=2

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.info.enabled=true
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

