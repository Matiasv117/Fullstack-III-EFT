spring.datasource.url=jdbc:h2:mem:msnotificacionesdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8084
server.servlet.context-path=/

# Logging
logging.level.root=WARN
logging.level.org.springframework=INFO
logging.level.com.saludrednorte=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JPA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Application
spring.application.name=ms-notificaciones
spring.profiles.active=dev

# Scheduler
spring.task.scheduling.thread-name-prefix=notif-scheduler-
spring.task.scheduling.pool.size=2

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.info.enabled=true
