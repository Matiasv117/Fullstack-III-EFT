server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        - id: ms-listas-espera
          uri: http://localhost:8083
          predicates:
            - Path=/api/listas-espera/**,/lista-espera/**,/pacientes/**
          filters:
            - StripPrefix=0

        - id: ms-notificaciones
          uri: http://localhost:8085
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0

        - id: ms-optimizacion
          uri: http://localhost:8084
          predicates:
            - Path=/optimizacion/**
          filters:
            - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: false

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: INFO
    com.saludrednorte: DEBUG




